# =========================================================
# Utility Macros — Voron 2.4 R2
# =========================================================

# ---------------------------------------------------------
# Homing helpers
# ---------------------------------------------------------

[gcode_macro _CG28]
description: Home only if not already homed
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28 METHOD=PROXIMITY
    {% endif %}

[gcode_macro _CQGL]
description: Run QGL only if not already applied
gcode:
    {% if printer.quad_gantry_level.applied == False %}
        QUAD_GANTRY_LEVEL
        G28 Z
    {% endif %}

[gcode_macro G32]
description: Full home + QGL for Voron 2.4 R2
gcode:
    BED_MESH_CLEAR
    SET_GCODE_OFFSET Z=0
    G90

    SET_DISPLAY_TEXT MSG="Homing"
    MS_HOMING
    G28

    SET_DISPLAY_TEXT MSG="QGL"
    MS_QGL
    QUAD_GANTRY_LEVEL

    G28 Z
    G0 X150 Y150 Z30 F18000
    MS_STANDBY

# ---------------------------------------------------------
# Park positions
# ---------------------------------------------------------

[gcode_macro PARKFRONT]
gcode:
    _CG28
    SAVE_GCODE_STATE NAME=PARKFRONT
    G90
    G0 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_minimum.y+5} Z{printer.toolhead.axis_maximum.z/2} F19500
    RESTORE_GCODE_STATE NAME=PARKFRONT

[gcode_macro PARKFRONTLOW]
gcode:
    _CG28
    SAVE_GCODE_STATE NAME=PARKFRONTLOW
    G90
    G0 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_minimum.y+5} Z20 F19500
    RESTORE_GCODE_STATE NAME=PARKFRONTLOW

[gcode_macro PARKREAR]
gcode:
    _CG28
    SAVE_GCODE_STATE NAME=PARKREAR
    G90
    G0 X{printer.toolhead.axis_minimum.x+10} Y{printer.toolhead.axis_maximum.y-10} Z{printer.toolhead.axis_maximum.z-50} F19500
    RESTORE_GCODE_STATE NAME=PARKREAR

[gcode_macro PARKCENTER]
gcode:
    _CG28
    SAVE_GCODE_STATE NAME=PARKCENTER
    G90
    G0 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_maximum.y/2} Z{printer.toolhead.axis_maximum.z/2} F19500
    RESTORE_GCODE_STATE NAME=PARKCENTER

[gcode_macro PARKBED]
gcode:
    _CG28
    SAVE_GCODE_STATE NAME=PARKBED
    G90
    G0 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_maximum.y/2} Z15 F19500
    RESTORE_GCODE_STATE NAME=PARKBED

# ---------------------------------------------------------
# Preheat
# ---------------------------------------------------------

[gcode_macro PREHEAT]
description: Preheat bed and chamber. Usage: PREHEAT MATERIAL=ABS
gcode:
    {% set material = params.MATERIAL|default("")|string %}

    G90
    _CG28
    G0 X150 Y150 Z50 F3600
    M106 S204

    SET_FAN_SPEED FAN=nevermore SPEED=1.0
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=110
    M141 S75
    MS_BED_PREHEAT

[gcode_macro PRIME_NOZZLE]
description: Manual prime line — only runs if hotend is at temp
gcode:
    {% if not printer.extruder.can_extrude %}
        RESPOND TYPE=error MSG="Extruder not hot enough to prime"
    {% else %}
        SAVE_GCODE_STATE NAME=PRIME_NOZZLE_STATE
        M117 Priming
        G90
        M83
        G92 E0
        G1 Z5 F900
        G1 Y3 X3 F27000
        G1 Z0.2 F900
        G91
        G1 X100 E25 F1000
        G1 Y-2 F1000
        G1 X-60 E9 F1000
        G1 E-0.5 F3000
        G1 X0.5 E0 F1000
        G1 X-5.5 E0 F1000
        RESTORE_GCODE_STATE NAME=PRIME_NOZZLE_STATE
    {% endif %}

# ---------------------------------------------------------
# Lights
# ---------------------------------------------------------

[gcode_macro LIGHTS_ON]
description: Standby light level. Optional LEVEL= param (0.0-1.0), default 0.2
gcode:
    {% set level = params.LEVEL|default(0.2)|float %}
    SET_PIN PIN=caselight VALUE={level}

[gcode_macro LIGHTS_MAX_ON]
description: Full brightness
gcode:
    SET_PIN PIN=caselight VALUE=1.0

[gcode_macro LIGHTS_OFF]
gcode:
    SET_PIN PIN=caselight VALUE=0

# ---------------------------------------------------------
# Nevermore
# ---------------------------------------------------------

[gcode_macro NEVERMORE_ON]
gcode:
    SET_FAN_SPEED FAN=nevermore SPEED=1.0

[gcode_macro NEVERMORE_OFF]
gcode:
    SET_FAN_SPEED FAN=nevermore SPEED=0.0

# ---------------------------------------------------------
# Filament load / unload with heating
# ---------------------------------------------------------

[gcode_macro HOT_LOAD]
description: Heat nozzle, load filament. Usage: HOT_LOAD TEMP=255
gcode:
    {% set t = params.TEMP|default(255)|int %}
    M104 S{t}
    PARKFRONT
    M109 S{t}
    LOAD_FILAMENT

[gcode_macro HOT_UNLOAD]
description: Heat nozzle, unload filament. Usage: HOT_UNLOAD TEMP=255
gcode:
    {% set t = params.TEMP|default(255)|int %}
    M104 S{t}
    PARKFRONT
    M109 S{t}
    UNLOAD_FILAMENT

# ---------------------------------------------------------
# Kill switch — everything off
# ---------------------------------------------------------

[gcode_macro OFF]
gcode:
    M84
    TURN_OFF_HEATERS
    M107
    SET_FAN_SPEED FAN=nevermore SPEED=0
    LIGHTS_OFF
    MS_LEDS_OFF

# ---------------------------------------------------------
# PRINTER_STATUS — quick health summary to console
# ---------------------------------------------------------

[gcode_macro PRINTER_STATUS]
description: Print a quick system status summary to console
gcode:
    {% set th = printer.toolhead %}
    {% set ex = printer.extruder %}
    {% set bed = printer.heater_bed %}
    {% set ch = printer["heater_generic chamber_heater"] %}
    RESPOND MSG="=== VORON STATUS ==="
    RESPOND MSG="Hotend:  {ex.temperature|round(1)}c / {ex.target|round(1)}c"
    RESPOND MSG="Bed:     {bed.temperature|round(1)}c / {bed.target|round(1)}c"
    RESPOND MSG="Chamber: {ch.temperature|round(1)}c / {ch.target|round(1)}c"
    RESPOND MSG="Position: X{th.position.x|round(2)} Y{th.position.y|round(2)} Z{th.position.z|round(3)}"
    RESPOND MSG="Homed:   {th.homed_axes}"

# ---------------------------------------------------------
# SAVE_OFFSET / LOAD_OFFSET — persist Z offset across restarts
# ---------------------------------------------------------

[gcode_macro SAVE_OFFSET]
description: Save current Z gcode offset to variables file
gcode:
    {% set z = printer.gcode_move.homing_origin.z %}
    RESPOND MSG="Saving Z offset: {z|round(4)}mm"
    SAVE_VARIABLE VARIABLE=saved_z_offset VALUE={z}

[gcode_macro LOAD_OFFSET]
description: Restore previously saved Z offset from variables file
gcode:
    {% if 'saved_z_offset' in printer.save_variables.variables %}
        {% set z = printer.save_variables.variables.saved_z_offset %}
        RESPOND MSG="Restoring Z offset: {z|round(4)}mm"
        SET_GCODE_OFFSET Z={z}
    {% else %}
        RESPOND TYPE=echo MSG="No saved Z offset found"
    {% endif %}

# ---------------------------------------------------------
# Dump all Klipper parameters — debugging
# ---------------------------------------------------------

[gcode_macro DUMP_PARAMETERS]
description: Dump all Klipper printer parameters to console
gcode:
    {% for name1 in printer %}
        {% for name2 in printer[name1] %}
            { action_respond_info("printer['%s'].%s = %s" % (name1, name2, printer[name1][name2])) }
        {% else %}
            { action_respond_info("printer['%s'] = %s" % (name1, printer[name1])) }
        {% endfor %}
    {% endfor %}

# ---------------------------------------------------------
# Backup to GitHub
# ---------------------------------------------------------

[gcode_shell_command backup_config]
command: /home/pi/klipper_backup.sh
timeout: 60
verbose: True

[gcode_macro BACKUP_CONFIG]
description: Manually trigger a GitHub config backup
gcode:
    RESPOND MSG="Backing up config to GitHub..."
    RUN_SHELL_COMMAND CMD=backup_config
