# =========================================================
# PRINT_START — Voron 2.4 R2
# Beacon staged homing, QGL, adaptive bed mesh,
# chamber soak, Matchstick LEDs
# =========================================================

[gcode_macro PRINT_START]
description: Voron 2.4 R2 print start
gcode:
    {% set target_bed = params.BED|int %}
    {% set target_extruder = params.EXTRUDER|int %}
    {% set target_chamber = params.CHAMBER|default("0")|int %}
    {% set start_chambertemp = target_chamber - 10 %}           # Reserved — pre-warm threshold, not yet wired up
    {% set material = params.MATERIAL|default("")|string %}
    {% set bed_type = params.BED_TYPE|default("")|string %}
    {% set filament = params.FILAMENT|default("")|string %}      # Reserved for future use
    {% set nozzle = params.NOZZLE|default(0.4)|float %}          # Reserved for future use

    {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
    {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}

    SET_GCODE_VARIABLE MACRO=M191 VARIABLE=target_bed VALUE={ target_bed }
    SET_GCODE_VARIABLE MACRO=M191 VARIABLE=target_extruder VALUE={ target_extruder }

    CLEAR_PAUSE
    SET_GCODE_OFFSET Z=0

    # Lights on
    SET_PIN PIN=caselight VALUE=0.60
    MS_STANDBY

    # Nevermore on — cancel any pending shutdown
    UPDATE_DELAYED_GCODE ID=NEVERMORE_OFF DURATION=0
    SET_FAN_SPEED FAN=nevermore SPEED=0.9

    # =================================================
    # Initial homing BEFORE heating
    # =================================================
    SET_DISPLAY_TEXT MSG="Homing"
    MS_HOMING
    G28 METHOD=PROXIMITY

    MS_Z_CONTACT
    G28 Z METHOD=CONTACT CALIBRATE=0
    G90

    BED_MESH_CLEAR
    G0 Z2 F9000

    # =================================================
    # Heating / soak
    # =================================================
    {% if target_bed > 80 %}
        SET_DISPLAY_TEXT MSG="Chamber: {target_chamber}c - Bed: {target_bed}c - Extruder: {target_extruder}c"
        MS_BED_PREHEAT

        M191 S{target_chamber}
        M106 S140                           # Parts fan on after soak

    {% else %}
        SET_DISPLAY_TEXT MSG="Bed: {target_bed}c - Extruder: {target_extruder}c"
        MS_BED_PREHEAT

        M109 S170                           # Light nozzle preheat
        M190 S{target_bed}

        {% if target_chamber > 0 %}
            M141 S{target_chamber}
        {% endif %}

        SET_DISPLAY_TEXT MSG="3 Minute Heatsoak"
        G4 P180000
    {% endif %}

    # Turn off parts fan before calibration moves
    M107
    RESPOND MSG="Calibrating"

    # =================================================
    # Contact Z calibration
    # =================================================
    MS_Z_CONTACT
    G28 Z METHOD=CONTACT CALIBRATE=1

    # =================================================
    # Quad Gantry Level
    # =================================================
    SET_DISPLAY_TEXT MSG="QGL"
    MS_QGL
    QUAD_GANTRY_LEVEL

    MS_Z_CONTACT
    G28 Z METHOD=CONTACT CALIBRATE=0

    # =================================================
    # Bed mesh
    # =================================================
    SET_DISPLAY_TEXT MSG="Bed mesh"
    MS_BED_MESH
    BED_MESH_CALIBRATE ADAPTIVE=1 RUNS=2

    # =================================================
    # Nozzle clean
    # =================================================
    SET_DISPLAY_TEXT MSG="Cleaning nozzle"
    MS_CLEAN_NOZZLE
    CLEAN_NOZZLE

    # =================================================
    # Final Z contact after clean tip
    # =================================================
    MS_Z_CONTACT
    G28 Z METHOD=CONTACT CALIBRATE=0

    # =================================================
    # Final nozzle heat
    # =================================================
    SET_DISPLAY_TEXT MSG="Hotend: {target_extruder}c"
    MS_HOTEND_PREHEAT
    G1 X{x_wait} Y{y_wait} Z15 F9000
    M109 S{target_extruder}

    SET_GCODE_OFFSET Z=0.03

    # =================================================
    # Per-material Z offset
    # =================================================
    {% set material_offsets = {
        'PPS-CF':         0.07,
        'ezPC-CF':        0.00,
        'PC-CF':         -0.02,
        'PC-CF Smooth':   0.00,
        'PC-CF Textured': -0.04,
        'PC-CF Yxpolyer':  0.04,
        'PC':             0.00,
        'PET-CF':         0.06,
        'PET':            0.06,
        'PET-GF':         0.06
    } %}
    {% if material in material_offsets %}
        RESPOND MSG="Adjusting Z offset for {material} ({material_offsets[material]}mm)"
        SET_GCODE_OFFSET Z_ADJUST={material_offsets[material]} MOVE=1
    {% elif material != "" %}
        RESPOND TYPE=echo MSG="No Z offset defined for {material} — using default"
    {% endif %}

    SET_DISPLAY_TEXT MSG="Printer go Brrrrrr"
    MS_PRINTING

    LINE_PURGE
