# =========================================================
# PRINT_END — Voron 2.4 R2
# =========================================================

[gcode_macro PRINT_END]
description: Voron 2.4 R2 print end — safe Z lift, park rear, full retract
gcode:
    {% set th = printer.toolhead %}
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}

    {% set x_safe = 20.0 if th.position.x < (max_x - 20) else -20.0 %}
    {% set y_safe = 20.0 if th.position.y < (max_y - 20) else -20.0 %}
    {% set z_safe = 10.0 if th.position.z < (max_z - 10) else (max_z - th.position.z) %}

    CLEAR_PAUSE
    SET_DISPLAY_TEXT MSG="Finishing print"
    M400

    # Small tip retract while still above print
    {% if printer.extruder.can_extrude %}
        M83
        G92 E0
        G1 E-0.5 F3600
    {% endif %}

    MS_PRINT_COMPLETE

    G91
    G0 X{x_safe} Y{y_safe} Z{z_safe} F30000

    SET_GCODE_OFFSET Z=0
    TURN_OFF_HEATERS
    M141 S0

    # Park rear
    G90
    G0 X{max_x / 2} Y{max_y - 5} F12000

    # Full retract now toolhead is clear
    {% if printer.extruder.can_extrude %}
        G1 E-70.0 F4800
    {% endif %}

    M107
    G92 E0
    BED_MESH_CLEAR

    # Restore standby light level
    SET_PIN PIN=caselight VALUE=0.20

    SET_DISPLAY_TEXT MSG="Print complete"

    # Keep Nevermore running 9 minutes after print end
    UPDATE_DELAYED_GCODE ID=NEVERMORE_OFF DURATION=540

    M84 X Y E
