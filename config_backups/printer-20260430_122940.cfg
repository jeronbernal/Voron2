# =========================================================
# Voron 2.4 R2 — BTT Octopus Pro + Beacon RevH + EBB36
# =========================================================
#
# Physical layout (CoreXY):
#
#   X / X1 — A/B motors (TMC5160 SPI)
#   Y / Y1 — A/B motors (TMC5160 SPI)
#   Z0 = Front Left  (MOT5)
#   Z1 = Rear Left   (MOT6)
#   Z2 = Rear Right  (MOT7)
#   Z3 = Front Right (MOT8)
#   E  = EBB36 CAN toolhead
# =========================================================

# =========================================================
# Klipper core
# [virtual_sdcard], [display_status], [pause_resume]
# are defined in mainsail.cfg — do not redefine them here
# =========================================================
[exclude_object]
[respond]
[force_move]
enable_force_move: true
[gcode_arcs]
resolution: 0.1
[save_variables]
filename: ~/printer_data/config/variables.txt

# =========================================================
# Printer kinematics & limits
# =========================================================
[printer]
kinematics: corexy
max_velocity: 400
max_accel: 35000
max_z_velocity: 25
max_z_accel: 350
square_corner_velocity: 20.0

# =========================================================
# Includes — third-party / extras
# =========================================================
[include mainsail.cfg]
[include KAMP_Settings.cfg]

# =========================================================
# Includes — hardware config
# =========================================================
[include config/mcu.cfg]
[include config/xy_steppers.cfg]
[include config/z_steppers.cfg]
[include config/extruder.cfg]
[include config/bed.cfg]
[include config/fans.cfg]
[include config/beacon.cfg]
[include config/bed_mesh.cfg]
[include config/qgl.cfg]
[include config/leds.cfg]
[include config/input_shaper.cfg]
[include config/temperature_sensors.cfg]
[include config/chamber_heater.cfg]

# =========================================================
# Includes — calibration tools
# =========================================================
[include calibration/adxl.cfg]
[include calibration/shaketune.cfg]
[include calibration/test_probe_accuracy.cfg]

# =========================================================
# Includes — macros
# =========================================================
[include macros/print_start.cfg]
[include macros/print_end.cfg]
[include macros/cancel_pause_resume.cfg]
[include macros/utility_macros.cfg]
[include macros/nozzle_scrub.cfg]
[include macros/chamber_macros.cfg]
[include macros/leds.cfg]
[include macros/TEST_SPEED.cfg]

# =========================================================
# Idle timeout
# =========================================================
[idle_timeout]
timeout: 900
gcode:
    MS_STANDBY
    TURN_OFF_HEATERS
    M84

