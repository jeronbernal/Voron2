# =========================================================
# XY Steppers — Voron 2.4 R2 (CoreXY)
# TMC5160 over SPI1
# =========================================================
#
# X  = A motor (right)  — MOT1
# X1 = A motor (left)   — MOT3
# Y  = B motor (rear)   — MOT0
# Y1 = B motor (front)  — MOT2
# =========================================================

# ---------------------------------------------------------
# X — MOT1
# ---------------------------------------------------------
[stepper_x]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
endstop_pin: PG11
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
position_min: 0
position_endstop: 295
position_max: 295
homing_speed: 100
homing_retract_dist: 10
homing_positive_dir: true

[tmc5160 stepper_x]
cs_pin: PD11
spi_bus: spi1
run_current: 1.4
sense_resistor: 0.075
interpolate: True
stealthchop_threshold: 0

# ---------------------------------------------------------
# X1 — MOT3
# ---------------------------------------------------------
[stepper_x1]
step_pin: PG4
dir_pin: PC1
enable_pin: !PA2
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200

[tmc5160 stepper_x1]
cs_pin: PC7
spi_bus: spi1
run_current: 1.4
sense_resistor: 0.075
interpolate: True
stealthchop_threshold: 0

# ---------------------------------------------------------
# Y — MOT0
# ---------------------------------------------------------
[stepper_y]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
endstop_pin: PG6
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
position_min: 0
position_endstop: 312
position_max: 312
homing_speed: 100
homing_retract_dist: 10
homing_positive_dir: true

[tmc5160 stepper_y]
cs_pin: PC4
spi_bus: spi1
run_current: 1.4
sense_resistor: 0.075
interpolate: True
stealthchop_threshold: 0

# ---------------------------------------------------------
# Y1 — MOT2
# ---------------------------------------------------------
[stepper_y1]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200

[tmc5160 stepper_y1]
cs_pin: PC6
spi_bus: spi1
run_current: 1.4
sense_resistor: 0.075
interpolate: True
stealthchop_threshold: 0
