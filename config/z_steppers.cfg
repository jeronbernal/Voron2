# =========================================================
# Z Steppers — Voron 2.4 R2 (4-point QGL)
# TMC2209 UART
# =========================================================
#
# Z0 = Front Left  — MOT5
# Z1 = Rear Left   — MOT6
# Z2 = Rear Right  — MOT7
# Z3 = Front Right — MOT8
# =========================================================

# ---------------------------------------------------------
# Z0 — Front Left — MOT5
# ---------------------------------------------------------
[stepper_z]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
endstop_pin: probe:z_virtual_endstop
homing_retract_dist: 0
position_max: 260
position_min: -5
homing_speed: 8

[tmc2209 stepper_z]
uart_pin: PF2
interpolate: False
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 999999

# ---------------------------------------------------------
# Z1 — Rear Left — MOT6
# ---------------------------------------------------------
[stepper_z1]
step_pin: PC13
dir_pin: !PF0
enable_pin: !PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z1]
uart_pin: PE4
interpolate: False
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 999999

# ---------------------------------------------------------
# Z2 — Rear Right — MOT7
# ---------------------------------------------------------
[stepper_z2]
step_pin: PE2
dir_pin: PE3
enable_pin: !PD4
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z2]
uart_pin: PE1
interpolate: False
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 999999

# ---------------------------------------------------------
# Z3 — Front Right — MOT8
# ---------------------------------------------------------
[stepper_z3]
step_pin: PE6
dir_pin: !PA14
enable_pin: !PE0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z3]
uart_pin: PD3
interpolate: False
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 999999
